services:
  - type: web
    name: evolutionapinex
    env: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: AUTHENTICATION_API_KEY
        sync: false
      - key: SERVER_PORT
        value: "10000"
      # opcional, mas recomendado para webhooks/links corretos
      - key: SERVER_URL
        sync: false
      # Fix: some versions require an explicit provider when DATABASE_ENABLED=true (default).
      # If you don't want an external DB, disable it to avoid startup failure.
      - key: DATABASE_ENABLED
        value: "false"
    disk:
      name: evolution-data
      mountPath: /evolution
      sizeGB: 1

